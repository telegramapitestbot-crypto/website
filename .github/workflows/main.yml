name: Auto Share Tailscale Machine

on:
  workflow_dispatch:

jobs:
  share:
    runs-on: ubuntu-latest

    env:
      TAILSCALE_AUTHKEY: tskey-auth-kErqicdzCC11CNTRL-zUAhdTpBoaXBn3BzpzszaXEAgqBZk2iRB
      SHARE_EMAIL: trongphucpython@gmail.com
      MACHINE_NAME: gh-runner-24227352594

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect Tailscale
        run: |
          sudo tailscale up --authkey=$TAILSCALE_AUTHKEY --hostname=gh-actions

      - name: Get machine list
        run: |
          tailscale status --json > status.json
          cat status.json

      - name: Find node and share
        run: |
          NODE_ID=$(python3 - << 'EOF'
import json

with open("status.json") as f:
    data = json.load(f)

machine = "gh-runner-24227352594"

node_id = ""

for peer in data.get("Peer", {}).values():
    if peer.get("HostName") == machine:
        node_id = peer.get("ID")

print(node_id)
EOF
)

          if [ -z "$NODE_ID" ]; then
            echo "❌ Machine not found"
            exit 1
          fi

          echo "Found node: $NODE_ID"

          tailscale share $NODE_ID user@example.com

      - name: Done
        run: echo "Shared successfully 🎉"
